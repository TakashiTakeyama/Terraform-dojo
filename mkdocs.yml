site_name: Terraform-dojo ドキュメント
site_description: Terraformプロジェクトのドキュメント
site_author: takeyamatakashi

theme:
  name: material
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - toc:
      permalink: true

nav:
  - ホーム: index.md
  - プロジェクト概要: overview.md
  - アーキテクチャ:
      - AWS アプリケーション基盤の選定基準: architecture/aws-application-platform-decision-guide.md
      - AWS Web 配信・SSR の考え方: architecture/aws-web-hosting-decision-guide.md
  - ガイドライン:
      - 概要: guidelines/index.md
      - Terraform コーディング規約: guidelines/terraform-coding-guideline.md
      - State 分割ガイド: guidelines/state-structure.md
  - モジュール:
      - 概要: modules/index.md
  - 変数一覧: variables.md
  - デプロイ方法: deployment.md
